// ── GitHub Sync ───────────────────────────────────────────────────────
// Public config (repo+file, no token) — stored separately so any browser can read
const WDA_PUBLIC_REPO = /*WDA_REPO_BEGIN*/"ncalbet/repositori-cursos"/*WDA_REPO_END*/;
const WDA_PUBLIC_FILE = /*WDA_FILE_BEGIN*/"wda-data.json"/*WDA_FILE_END*/;

function getGHConfig() {
  try {
    const saved = JSON.parse(localStorage.getItem("wda_gh")||"null")||{token:"",repo:"",file:"wda-data.json",sha:""};
    // Always use public config as fallback for repo/file so any browser can load data
    if (!saved.repo) saved.repo = WDA_PUBLIC_REPO;
    if (!saved.file) saved.file = WDA_PUBLIC_FILE;
    return saved;
  }
  catch(err){ return {token:"",repo:WDA_PUBLIC_REPO,file:WDA_PUBLIC_FILE,sha:""}; }
}
function saveGHConfig(cfg) { try { localStorage.setItem("wda_gh",JSON.stringify(cfg)); } catch(err){} }

async function ghReadPublic(cfg) {
  // Read via raw URL — no token needed, works on any browser
  const [owner,repo] = cfg.repo.split("/");
  const branch = cfg.branch || "main";
  const url = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${cfg.file}?t=${Date.now()}`;
  const r = await fetch(url);
  if (r.status===404) return null;
  if (!r.ok) throw new Error("GitHub raw error: "+r.status);
  return {content: await r.json(), sha: null};
}

async function ghReadWithToken(cfg) {
  // Read via API with token — needed to get SHA for subsequent writes
  const [owner,repo] = cfg.repo.split("/");
  const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${cfg.file}`,{headers:{Authorization:`token ${cfg.token}`,Accept:"application/vnd.github.v3+json"}});
  if (r.status===404) return null;
  if (!r.ok) throw new Error("GitHub error: "+r.status);
  const data = await r.json();
  return {content:JSON.parse(atob(data.content.replace(/\n/g,""))),sha:data.sha};
}

async function ghRead(cfg) {
  // If we have a token, use the API (to get SHA); otherwise use public URL
  if (cfg.token) return ghReadWithToken(cfg);
  return ghReadPublic(cfg);
}
async function ghWrite(cfg,data,message) {
  const [owner,repo] = cfg.repo.split("/");
  const body = {message,content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))))};
  if (cfg.sha) body.sha = cfg.sha;
  const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${cfg.file}`,{method:"PUT",headers:{Authorization:`token ${cfg.token}`,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(body)});
  if (!r.ok) throw new Error("GitHub write error: "+r.status);
  return (await r.json()).content.sha;
}

function LoginModal({onClose}) {
  const [user,setUser]=useState("");const [pass,setPass]=useState("");
  const inp={width:"100%",padding:"10px 14px",borderRadius:10,border:"1.5px solid #e2e8f0",fontSize:15,outline:"none",fontFamily:"inherit"};
  return e('div',{className:"overlay",onClick:onClose},
    e('div',{className:"modal",style:{width:380,display:"flex",flexDirection:"column",gap:20},onClick:ev=>ev.stopPropagation()},
      e('div',{style:{textAlign:"center"}},
        e('div',{style:{width:56,height:56,borderRadius:16,background:"#dbeafe",margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}},"🎓"),
        e('h2',{style:{fontSize:22,fontWeight:900}},"Accés Alumnes"),
        e('p',{style:{fontSize:13,color:"#666",marginTop:4}},"Entra amb el teu usuari per veure els teus cursos")
      ),
      e('div',{style:{display:"flex",flexDirection:"column",gap:12}},
        e('input',{style:inp,placeholder:"Nom d'usuari",value:user,onChange:ev=>setUser(ev.target.value)}),
        e('input',{type:"password",style:inp,placeholder:"Contrasenya",value:pass,onChange:ev=>setPass(ev.target.value)})
      ),
      e('button',{style:{padding:"12px",borderRadius:12,border:"none",background:"#3b82f6",color:"white",fontSize:15,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},"Entrar"),
      e('p',{style:{textAlign:"center",fontSize:12,color:"#94a3b8",fontWeight:600}},"Funció pròximament disponible")
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────
function App() {
  const [settings,setSettings] = useState(loadSettings);
  const [ghCfg,setGhCfg]       = useState(getGHConfig);
  const [syncStatus,setSync]   = useState(()=>getGHConfig().token?"idle":"nogh");
  const shaRef = useRef(getGHConfig().sha||"");

  const local = loadLocal();
  const [courses,setCourses]       = useState(local.courses);
  const [resources,setResources]   = useState(local.resources);
  const [initialLoaded,setInitialLoaded] = useState(false);
  const [viewMode,setViewMode]   = useState(()=>localStorage.getItem("wda_view")||"grid"); // "grid"|"list"

  const [search,setSearch]       = useState("");
  const [filterSubj,setFSubj]    = useState("Totes");
  const [filterSt,setFSt]        = useState("Tots");
  const [tab,setTab]             = useState("cursos");
  const [addModal,setAddModal]   = useState(null);
  const [showLogin,setShowLogin] = useState(false);
  const [showAdminLogin,setShowAdminLogin] = useState(false);
  const [showGithub,setShowGithub]   = useState(false);
  const [showGHConfig,setShowGHConfig] = useState(false);
  const [showSettings,setShowSettings] = useState(false);
  const [isAdmin,setIsAdmin]     = useState(()=>sessionStorage.getItem("wda_admin")==="1");

  // drag state
  const [dragging,setDragging]   = useState(null);
  const dragOver = useRef(null);

  // ── Load publicly on startup (no token needed) ────────────────────
  useEffect(()=>{
    const cfg = getGHConfig();
    if (!cfg.repo || initialLoaded) return;
    setInitialLoaded(true);
    setSync("syncing");
    ghReadPublic(cfg)
      .then(result=>{
        if (result&&result.content) {
          if (result.content.courses)   { setCourses(result.content.courses);   saveLocal(result.content.courses, result.content.resources||[]); }
          if (result.content.resources) setResources(result.content.resources);
        }
        setSync(cfg.token?"idle":"nogh");
      })
      .catch(()=>setSync(cfg.token?"idle":"nogh"));
  },[]);

  // ── Sync ──────────────────────────────────────────────────────────
  async function loadFromGitHub(cfg) {
    if (!cfg.token||!cfg.repo) return;
    setSync("syncing");
    try {
      const result = await ghRead(cfg);
      if (result) {
        const {content,sha}=result;
        shaRef.current=sha;
        saveGHConfig(Object.assign({},cfg,{sha}));
        setGhCfg(c=>Object.assign({},c,{sha}));
        if (content.courses)   {setCourses(content.courses);saveLocal(content.courses,content.resources||[]);}
        if (content.resources) setResources(content.resources);
      }
      setSync("idle");
    } catch(err){console.error(err);setSync("error");}
  }

  async function syncGitHub(newCourses,newResources) {
    const cfg=getGHConfig();
    if (!cfg.token||!cfg.repo){setSync("nogh");return;}
    setSync("syncing");
    try {
      const data={courses:newCourses,resources:newResources,updatedAt:new Date().toISOString()};
      const latestCfg=Object.assign({},cfg,{sha:shaRef.current});
      const newSha=await ghWrite(latestCfg,data,"Actualització WDA "+new Date().toLocaleString("ca"));
      shaRef.current=newSha;
      saveGHConfig(Object.assign({},latestCfg,{sha:newSha}));
      setGhCfg(c=>Object.assign({},c,{sha:newSha}));
      setSync("ok");
      setTimeout(()=>setSync("idle"),2500);
    } catch(err){console.error(err);setSync("error");}
  }

  function mutate(newCourses,newResources) {
    setCourses(newCourses);setResources(newResources);
    saveLocal(newCourses,newResources);
    syncGitHub(newCourses,newResources);
  }

  function adminIn(){sessionStorage.setItem("wda_admin","1");setIsAdmin(true);setShowAdminLogin(false);loadFromGitHub(ghCfg);}
  function adminOut(){sessionStorage.removeItem("wda_admin");setIsAdmin(false);}

  function saveGHCfg(cfg){saveGHConfig(cfg);setGhCfg(cfg);shaRef.current=cfg.sha||"";setShowGHConfig(false);setSync(cfg.token?"idle":"nogh");if(cfg.token&&isAdmin)loadFromGitHub(cfg);}
  function handleSaveSettings(s){saveSettings(s);setSettings(s);setShowSettings(false);}

  // ── Edit / Delete ────────────────────────────────────────────────
  function handleEdit(id,fields,fromType,toType){
    let nc=courses,nr=resources;
    if (fromType===toType){
      if(fromType==="curs") nc=courses.map(c=>c.id===id?Object.assign({},c,fields):c);
      else nr=resources.map(r=>r.id===id?Object.assign({},r,fields):r);
    } else if(fromType==="curs"&&toType==="recurs"){
      const item=courses.find(c=>c.id===id);
      nc=courses.filter(c=>c.id!==id);
      nr=[...resources,Object.assign({},item,fields,{resourceType:fields.resourceType||"web"})];
    } else if(fromType==="recurs"&&toType==="curs"){
      const item=resources.find(r=>r.id===id);
      nr=resources.filter(r=>r.id!==id);
      nc=[...courses,Object.assign({},item,fields,{status:fields.status||"actiu",level:fields.level||"",teacherUrl:fields.teacherUrl||""})];
    }
    mutate(nc,nr);
  }

  function handleDelete(id,type){
    mutate(type==="curs"?courses.filter(c=>c.id!==id):courses, type==="recurs"?resources.filter(r=>r.id!==id):resources);
  }

  function handleAdd(item){
    mutate(item.type==="curs"?[...courses,item.data]:courses, item.type==="recurs"?[...resources,item.data]:resources);
    setAddModal(null);
  }

  function handleGHImport(items){mutate([...courses,...items],resources);setShowGithub(false);}

  // ── Drag & Drop ──────────────────────────────────────────────────
  function onDragStart(id){setDragging(id);}
  function onDragOver(id){dragOver.current=id;}
  function onDrop(){
    if(!dragging||!dragOver.current||dragging===dragOver.current) return;
    const from=courses.findIndex(c=>c.id===dragging);
    const to=courses.findIndex(c=>c.id===dragOver.current);
    if(from===-1||to===-1) return;
    const nc=[...courses];
    const [moved]=nc.splice(from,1);nc.splice(to,0,moved);
    mutate(nc,resources);
  }
  function onDragEnd(){setDragging(null);dragOver.current=null;}

  // ── View mode ────────────────────────────────────────────────────
  function toggleView(v){setViewMode(v);localStorage.setItem("wda_view",v);}

  // ── Derived ──────────────────────────────────────────────────────
  const visible=isAdmin?courses:courses.filter(c=>c.status==="actiu");
  const uniqSubj=["Totes",...[...new Set(visible.map(c=>c.subject))]];
  const statuses=["Tots","Actiu","En construcció","Arxivat"];
  const existingUrls=courses.map(c=>c.url);

  const filtered=useMemo(()=>visible.filter(c=>{
    const q=search.toLowerCase();
    const ms=!q||c.title.toLowerCase().includes(q)||c.subject.toLowerCase().includes(q)||(c.level||"").toLowerCase().includes(q);
    const mf=filterSubj==="Totes"||c.subject===filterSubj;
    const mst=!isAdmin||filterSt==="Tots"||(filterSt==="Actiu"&&c.status==="actiu")||(filterSt==="En construcció"&&c.status==="construccio")||(filterSt==="Arxivat"&&c.status==="arxivat");
    return ms&&mf&&mst;
  }),[search,filterSubj,filterSt,visible,isAdmin]);

  const filtRes=useMemo(()=>resources.filter(r=>{const q=search.toLowerCase();return!q||r.title.toLowerCase().includes(q)||r.subject.toLowerCase().includes(q);}),[search,resources]);

  const grouped=useMemo(()=>{
    if(!settings.showGrouping) return{"Tots els cursos":filtered};
    const g={};filtered.forEach(c=>{if(!g[c.subject])g[c.subject]=[];g[c.subject].push(c);});return g;
  },[filtered,settings.showGrouping]);

  const groupedRes=useMemo(()=>{const g={};filtRes.forEach(r=>{const k=r.subject||"Altres";if(!g[k])g[k]=[];g[k].push(r);});return g;},[filtRes]);

  function chip(active,color){return{padding:"6px 16px",borderRadius:99,border:"none",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",background:active?(color||"#1a1a2e"):"white",color:active?"white":"#666",boxShadow:active?"0 2px 8px rgba(0,0,0,0.15)":"0 1px 4px rgba(0,0,0,0.07)",transition:"all .18s"};}
  function tabSt(active){return{padding:"10px 22px",borderRadius:10,border:"none",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit",background:active?"#3b82f6":"transparent",color:active?"white":"rgba(255,255,255,0.75)",transition:"all .18s"};}
  function viewBtn(active){return{width:32,height:32,borderRadius:8,border:"1.5px solid "+(active?"#3b82f6":"#d1d5db"),background:active?"#3b82f6":"white",color:active?"white":"#6b7280",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,transition:"all .18s"};}

  const courseProps={radius:settings.cardRadius,isAdmin,onEdit:handleEdit,onDelete:handleDelete,dragging,onDragStart,onDragOver,onDrop,onDragEnd};

  return e('div',{style:{minHeight:"100vh",background:"#f8f7f2"}},
    e('style',null,"@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}} @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}"),

    // Header
    e('header',{style:{background:"white",borderBottom:"1.5px solid #e5e7eb",padding:"0 32px",position:"sticky",top:0,zIndex:100}},
      e('div',{style:{maxWidth:1200,margin:"0 auto",height:64,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}},
        e('div',{style:{display:"flex",alignItems:"center",gap:12}},
          e('div',{style:{width:38,height:38,borderRadius:10,background:"#3b82f6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}},"📚"),
          e('div',null,
            e('div',{style:{fontSize:17,fontWeight:900,lineHeight:1.1}},settings.schoolName),
            e('div',{style:{fontSize:11,color:"#888",fontWeight:600}},settings.teacherName)
          )
        ),
        e('div',{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
          isAdmin&&e(SyncBadge,{status:syncStatus}),
          isAdmin&&e('div',{style:{display:"flex",gap:6,alignItems:"center"}},
            e('button',{onClick:()=>setShowSettings(true),style:{padding:"7px 13px",borderRadius:9,border:"1.5px solid #e5e7eb",background:"white",color:"#555",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},"⚙ Configuració"),
            e('button',{onClick:()=>setShowGHConfig(true),style:{padding:"7px 13px",borderRadius:9,border:"1.5px solid "+(ghCfg.token?"#10b981":"#e5e7eb"),background:ghCfg.token?"#f0fdf4":"white",color:ghCfg.token?"#15803d":"#888",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},ghCfg.token?"⚙ GitHub":"⚙ Connectar GH"),
            e('button',{onClick:()=>setShowGithub(true),style:{padding:"7px 13px",borderRadius:9,border:"1.5px solid #1a1a2e",background:"white",color:"#1a1a2e",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},"⬇ Importar"),
            e('button',{onClick:()=>setAddModal("curs"),style:{padding:"7px 13px",borderRadius:9,border:"1.5px solid #3b82f6",background:"white",color:"#3b82f6",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},"+ Curs"),
            e('button',{onClick:()=>setAddModal("recurs"),style:{padding:"7px 13px",borderRadius:9,border:"1.5px solid #8b5cf6",background:"white",color:"#8b5cf6",fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},"+ Recurs"),
            e('div',{style:{width:1,height:24,background:"#e5e7eb"}}),
            e('div',{style:{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:8,background:"#1a1a2e",color:"white",fontSize:11,fontWeight:800}},
              "🔐 Admin",
              e('button',{onClick:adminOut,style:{background:"rgba(255,255,255,0.18)",border:"none",color:"white",borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}},"Sortir")
            )
          ),
          e('button',{onClick:()=>setShowLogin(true),style:{padding:"8px 18px",borderRadius:10,border:"none",background:"#3b82f6",color:"white",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},"🎓 Alumnes"),
          !isAdmin&&e('button',{onClick:()=>setShowAdminLogin(true),title:"Administrador",style:{width:32,height:32,borderRadius:8,border:"1.5px solid #e5e7eb",background:"white",color:"#aaa",fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}},"⚙")
        )
      )
    ),

    // Hero
    e('div',{style:{background:"linear-gradient(135deg, #3b82f6 0%, #6366f1 100%)",padding:"36px 32px 28px"}},
      e('div',{style:{maxWidth:1200,margin:"0 auto"}},
        e('div',{style:{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:16,marginBottom:20}},
          e('div',null,
            e('h1',{style:{fontSize:30,fontWeight:900,color:"white",marginBottom:4}},tab==="cursos"?"Els meus cursos":"Recursos educatius"),
            e('p',{style:{color:"rgba(255,255,255,0.8)",fontWeight:600,fontSize:14}},tab==="cursos"?visible.length+" webs d'aprenentatge":resources.length+" recursos disponibles")
          ),
          e('div',{style:{display:"flex",gap:4,background:"rgba(0,0,0,0.2)",borderRadius:12,padding:4}},
            e('button',{style:tabSt(tab==="cursos"),onClick:()=>setTab("cursos")},"📚 Cursos"),
            e('button',{style:tabSt(tab==="recursos"),onClick:()=>setTab("recursos")},"🗂 Recursos")
          )
        ),
        e('div',{style:{position:"relative",maxWidth:480}},
          e('span',{style:{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:18,opacity:0.5}},"🔍"),
          e('input',{value:search,onChange:ev=>setSearch(ev.target.value),placeholder:"Cerca per títol, matèria o nivell...",
            style:{width:"100%",padding:"12px 16px 12px 44px",borderRadius:12,border:"none",fontSize:15,fontFamily:"inherit",fontWeight:600,background:"rgba(255,255,255,0.95)",boxShadow:"0 4px 20px rgba(0,0,0,0.15)",outline:"none"}})
        )
      )
    ),

    // Filters + view toggle
    tab==="cursos"&&e('div',{style:{background:"white",borderBottom:"1.5px solid #e5e7eb",padding:"12px 32px",position:"sticky",top:64,zIndex:99}},
      e('div',{style:{maxWidth:1200,margin:"0 auto",display:"flex",gap:16,flexWrap:"wrap",alignItems:"center",justifyContent:"space-between"}},
        e('div',{style:{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}},
          e('div',{style:{display:"flex",gap:6,flexWrap:"wrap"}},
            uniqSubj.map(s=>e('button',{key:s,style:chip(filterSubj===s),onClick:()=>setFSubj(s)},s))
          ),
          isAdmin&&e('div',{style:{display:"flex",gap:6}},
            statuses.map(s=>e('button',{key:s,style:chip(filterSt===s,"#10b981"),onClick:()=>setFSt(s)},s))
          )
        ),
        // View mode toggle
        e('div',{style:{display:"flex",gap:4}},
          e('button',{onClick:()=>toggleView("grid"),style:viewBtn(viewMode==="grid"),title:"Vista graella"},
            e('svg',{width:16,height:16,viewBox:"0 0 16 16",fill:"currentColor"},
              e('rect',{x:0,y:0,width:7,height:7,rx:1}),e('rect',{x:9,y:0,width:7,height:7,rx:1}),
              e('rect',{x:0,y:9,width:7,height:7,rx:1}),e('rect',{x:9,y:9,width:7,height:7,rx:1})
            )
          ),
          e('button',{onClick:()=>toggleView("list"),style:viewBtn(viewMode==="list"),title:"Vista llista"},
            e('svg',{width:16,height:16,viewBox:"0 0 16 16",fill:"currentColor"},
              e('rect',{x:0,y:1,width:16,height:3,rx:1}),e('rect',{x:0,y:6,width:16,height:3,rx:1}),e('rect',{x:0,y:11,width:16,height:3,rx:1})
            )
          )
        )
      )
    ),

    // Content
    e('main',{style:{maxWidth:1200,margin:"0 auto",padding:"36px 32px 64px"}},
      tab==="cursos"&&(
        Object.entries(grouped).length===0
          ?e('div',{style:{textAlign:"center",padding:"80px 0",color:"#888"}},e('div',{style:{fontSize:48,marginBottom:12}},"🔎"),e('div',{style:{fontSize:18,fontWeight:700}},"Cap resultat trobat"))
          :Object.entries(grouped).map(([group,gcs])=>
            e('section',{key:group,style:{marginBottom:48}},
              settings.showGrouping&&e('div',{style:{display:"flex",alignItems:"center",gap:12,marginBottom:20}},
                e('h2',{style:{fontSize:18,fontWeight:900,color:"#2d2d4e"}},group),
                e('span',{style:{fontSize:12,fontWeight:700,background:"#f1f5f9",color:"#64748b",padding:"2px 10px",borderRadius:99}},gcs.length),
                e('div',{style:{flex:1,height:1.5,background:"#e5e7eb"}})
              ),
              viewMode==="grid"
                ?e('div',{className:"card-grid"},gcs.map(c=>e(CourseCard,{key:c.id,course:c,...courseProps})))
                :e('div',{className:"card-list"},gcs.map(c=>e(CourseRow,{key:c.id,course:c,...courseProps})))
            )
          )
      ),
      tab==="recursos"&&(
        resources.length===0
          ?e('div',{style:{textAlign:"center",padding:"80px 0",color:"#888"}},
              e('div',{style:{fontSize:48,marginBottom:12}},"🗂"),
              e('div',{style:{fontSize:18,fontWeight:700}},"Encara no hi ha recursos"),
              isAdmin&&e('button',{onClick:()=>setAddModal("recurs"),style:{marginTop:20,padding:"11px 24px",borderRadius:12,border:"none",background:"#8b5cf6",color:"white",fontSize:14,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}},"+ Afegir primer recurs")
            )
          :Object.entries(groupedRes).map(([group,grs])=>
              e('section',{key:group,style:{marginBottom:44}},
                e('div',{style:{display:"flex",alignItems:"center",gap:12,marginBottom:18}},
                  e('h2',{style:{fontSize:18,fontWeight:900,color:"#2d2d4e"}},group),
                  e('span',{style:{fontSize:12,fontWeight:700,background:"#f1f5f9",color:"#64748b",padding:"2px 10px",borderRadius:99}},grs.length),
                  e('div',{style:{flex:1,height:1.5,background:"#e5e7eb"}})
                ),
                e('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(240px, 1fr))",gap:18}},
                  grs.map(r=>e(ResourceCard,{key:r.id,resource:r,radius:settings.cardRadius,isAdmin,onEdit:handleEdit,onDelete:handleDelete}))
                )
              )
            )
      )
    ),

    // Modals
    showLogin       &&e(LoginModal,       {onClose:()=>setShowLogin(false)}),
    showAdminLogin  &&e(AdminLogin,       {pin:settings.adminPin,onSuccess:adminIn,onClose:()=>setShowAdminLogin(false)}),
    addModal        &&e(AddModal,         {mode:addModal,onSave:handleAdd,onClose:()=>setAddModal(null)}),
    showGithub      &&e(GitHubImportModal,{githubUser:settings.githubUser,existingUrls,onImport:handleGHImport,onClose:()=>setShowGithub(false)}),
    showGHConfig    &&e(GHConfigModal,    {cfg:ghCfg,onSave:saveGHCfg,onClose:()=>setShowGHConfig(false)}),
    showSettings    &&e(SettingsModal,    {settings,onSave:handleSaveSettings,onClose:()=>setShowSettings(false)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
</script>
</body>
</html>
